<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movers Part 6: Picture Writing</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://unpkg.com/pinch-zoom-js@2.3.5/dist/pinch-zoom.min.js"></script>
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #FDFBF7; min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: 0; }
        
        .btn-back { display: inline-block; background: linear-gradient(135deg, #00BCD4, #4DD0E1); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid white; cursor: pointer; transition: transform 0.2s; text-decoration: none;}
        .btn-back:hover { background-color: #555; transform: translateY(-2px); color: white; }

        .story-input { border-bottom: 3px solid #cbd5e1; background: transparent; font-weight: 700; color: #4338ca; text-align: center; width: 180px; outline: none; transition: border-color 0.2s; padding: 0 5px; }
        .story-input:focus { border-bottom-color: #4f46e5; }
        .story-input.correct { border-bottom-color: #22c55e; color: #15803d; }
        .story-input.wrong { border-bottom-color: #ef4444; color: #b91c1c; text-decoration: line-through; }

        .sentence-input { width: 100%; border: 2px solid #cbd5e1; border-radius: 8px; padding: 10px; font-weight: 700; color: #334155; outline: none; transition: border-color 0.2s; resize: none; }
        .sentence-input:focus { border-color: #4f46e5; }
        .sentence-input:disabled { background-color: #f8fafc; color: #64748b; }

        .class-gap { display: inline-flex; align-items: center; justify-content: center; min-width: 100px; height: 35px; border-bottom: 4px solid #cbd5e1; font-weight: 700; color: #94a3b8; cursor: pointer; transition: all 0.2s; margin: 0 5px; background-color: #f8fafc; border-radius: 8px 8px 0 0; }
        .class-gap:hover { background-color: #fef3c7; border-bottom-color: #fbbf24; color: #d97706; }
        .class-gap.revealed { border-bottom-color: #22c55e; color: #15803d; background-color: #f0fdf4; }

        .score-select { appearance: none; background-color: #f1f5f9; border: 2px solid #cbd5e1; border-radius: 8px; padding: 5px 10px; font-weight: bold; color: #334155; cursor: pointer; outline: none; text-align: center; }
        .score-select:focus { border-color: #4f46e5; }

        /* ADDED: Styles for the new Pop-Out Modal */
        #zoom-modal { display: flex; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.3s; pointer-events: none; opacity: 0; }
        #zoom-modal.visible { pointer-events: auto; opacity: 1; }
        .pinch-zoom-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        /* Add this piece right here to stop the bottom cutting off! */
        #zoomed-image {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: contain;
        }
    </style>
<script data-goatcounter="https://TeflTools.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body class="p-4 sm:p-8">

    <div class="w-full max-w-7xl mx-auto mt-2 bg-white shadow-xl rounded-3xl border-4 border-slate-100 flex flex-col h-[85vh] overflow-hidden">
        
        <div class="bg-white border-b-2 border-slate-100 p-4 md:p-6 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-6">
                <a href="reading_kids_index.html" class="btn-back">← Menu</a>
                <h1 class="text-2xl font-extrabold text-slate-800">Movers <span class="text-indigo-500">Part 6</span></h1>
            </div>
        </div>

        <div class="flex-1 overflow-hidden relative flex flex-col">
            
            <div id="screen-dashboard" class="flex-1 flex flex-col items-center justify-center p-8 overflow-y-auto">
                <h3 class="text-3xl font-bold mb-8 text-center text-slate-600">Choose how to play!</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full mb-10 max-w-3xl">
                    <button onclick="app.selectMode('classroom')" id="mode-classroom" class="flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50">
                        <span class="text-6xl mb-4">👨‍🏫</span>
                        <span class="text-3xl font-bold text-slate-700">Classroom</span>
                        <span class="text-lg mt-2">Discuss answers as a group.</span>
                    </button>
                    <button onclick="app.selectMode('exam')" id="mode-exam" class="flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50">
                        <span class="text-6xl mb-4">📝</span>
                        <span class="text-3xl font-bold text-slate-700">Exam Practice</span>
                        <span class="text-lg mt-2">Type your sentences. 10 Marks.</span>
                    </button>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <button onclick="app.startActivity()" id="start-btn" disabled class="px-12 py-4 bg-indigo-500 text-white rounded-2xl font-bold text-2xl transition hover:bg-indigo-600 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed">Loading Database... ⏳</button>
                    <button onclick="app.showList()" id="btn-list" disabled class="text-slate-400 font-bold hover:text-indigo-500 text-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">or Pick from List</button>
                </div>
            </div>

            <div id="screen-list" class="hidden flex-1 overflow-y-auto p-8 flex flex-col w-full bg-slate-50">
                <h2 class="text-4xl font-black text-slate-800 mb-6 text-center">Choose a Picture Task</h2>
                <div id="list-container" class="space-y-4 pb-10 flex-1 max-w-3xl mx-auto w-full"></div>
                <div class="flex justify-center mt-4"><button onclick="app.showDashboard()" class="px-8 py-3 font-bold text-white rounded-xl bg-slate-400 hover:bg-slate-500 shadow-sm transition">Back</button></div>
            </div>

            <div id="screen-activity" class="hidden flex-1 flex flex-row bg-slate-50 overflow-hidden">
                
                <div class="w-[45%] h-full p-6 border-r-4 border-slate-200 bg-white flex flex-col">
                    <h2 id="act-title" class="text-3xl font-black text-slate-800 mb-4"></h2>
                    <div class="flex-1 w-full bg-slate-100 rounded-2xl overflow-hidden border-4 border-slate-200 shadow-inner flex items-center justify-center cursor-pointer transition-all hover:border-indigo-400">
                        <img id="exam-image" src="" alt="Exam Task Image" class="w-full h-full object-contain">
                    </div>
                </div>

                <div class="w-[55%] h-full flex flex-col">
                    <div class="flex-1 overflow-y-auto p-8 space-y-8" id="questions-container">
                    </div>
                    
                    <div class="p-6 bg-white border-t-2 border-slate-200 flex justify-between items-center shadow-inner mt-auto">
                        <div id="score-tally" class="hidden text-2xl font-black text-indigo-600 bg-indigo-50 px-6 py-2 rounded-xl border-2 border-indigo-200">Score: <span id="current-score">0</span> / 10</div>
                        <button id="btn-check" onclick="app.checkAnswers()" class="hidden px-8 py-4 rounded-xl font-bold text-xl bg-green-500 text-white hover:bg-green-600 transition shadow-md ml-auto">Check Answers ✓</button>
                        <button id="btn-finish" onclick="app.showDashboard()" class="hidden px-8 py-4 rounded-xl font-bold text-xl bg-slate-400 text-white hover:bg-slate-500 transition shadow-md ml-auto">Finish & Exit</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="zoom-modal" class="fixed inset-0 bg-slate-900 bg-opacity-95 hidden">
        <div class="pinch-zoom-container">
            <img id="zoomed-image" src="" alt="Zoomed Exam Image">
        </div>
        <button onclick="app.closeImageModal()" class="absolute top-6 right-6 text-5xl font-bold text-white opacity-60 hover:opacity-100 transition">&times;</button>
    </div>

    <script>
        // PASTE YOUR SUPABASE KEYS HERE
        const SUPABASE_URL = "https://ehhkjhyanmovymjqlxwo.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaGtqaHlhbm1vdnltanFseHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczODI3NzQsImV4cCI6MjA4Mjk1ODc3NH0.LIbusFxccfDl_Jxf3NO0CIKo4WRUA-88R9bQwQ1QWuk";



        const app = {
            supabase: null,
            data: [], 
            state: { mode: null, currentIdx: 0, autoScore: 0 },
            zoomSpanner: null, 

            // --- THE RECEIVER ---
            getParams: function() {
                const params = new URLSearchParams(window.location.search);
                const extensions = ['storyId', 'mode'];
                let result = {};
                for (const ext of extensions) {
                    if (params.has(ext)) {
                        result[ext] = params.get(ext);
                    }
                }
                return result; 
            },

            startApp: async function() {
                await this.loadData();
                if (this.data.length > 0) {
                    document.getElementById('start-btn').innerText = "Let's Go! →";
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('btn-list').disabled = false;
                } else {
                    document.getElementById('start-btn').innerText = "No texts found!";
                }
            },

            startSharedApp: async function(extensions) {
                try {
                    const { data, error } = await this.supabase
                        .from('reading_materials')
                        .select('material_data')
                        .eq('exam_part', 6) 
                        .eq('material_data->>id', extensions.storyId); 

                    if (error || data.length === 0) {
                        console.warn("Extension not found! Reverting to default menu.");
                        return await this.startApp(); 
                    }

                    this.data = [data[0].material_data]; 
                    this.state.currentIdx = 0; 
                    document.getElementById('start-btn').innerText = "Let's Go! →";
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('btn-list').disabled = false;
                } catch (e) {
                    console.error("Shared link error", e);
                    await this.startApp();
                }
            },

            init: async function() {
                if (typeof supabase !== 'undefined') {
                    this.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    
                    const extensions = this.getParams();

                    if (extensions.storyId) {
                        await this.startSharedApp(extensions);
                    } else {
                        await this.startApp();
                    }

                    if (extensions.mode) {
                        this.selectMode(extensions.mode);
                        if (this.data.length > 0) {
                            this.startActivity(false); 
                        }
                    }
                } else {
                    document.getElementById('start-btn').innerText = "Database error. Check code.";
                }
            },

            loadData: async function() {
                try {
                    const { data, error } = await this.supabase
                        .from('reading_materials')
                        .select('material_data')
                        .eq('exam_level', 'Movers')
                        .eq('exam_part', 6);

                    if (error) throw error;
                    this.data = data.map(row => row.material_data);
                } catch (e) {
                    console.error("Connection Error:", e);
                }
            },

            selectMode: function(m) {
                this.state.mode = m;
                document.getElementById('mode-classroom').className = m === 'classroom' ? "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-indigo-400 bg-indigo-50 text-indigo-700 transition-all cursor-pointer min-h-[160px] shadow-md transform -translate-y-1" : "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50";
                document.getElementById('mode-exam').className = m === 'exam' ? "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-indigo-400 bg-indigo-50 text-indigo-700 transition-all cursor-pointer min-h-[160px] shadow-md transform -translate-y-1" : "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50";
                
                if (this.data.length > 0) {
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('btn-list').disabled = false;
                }
            },

            showList: function() {
                const container = document.getElementById('list-container');
                container.innerHTML = '';
                this.data.forEach((item, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-5 bg-white rounded-2xl hover:bg-indigo-50 border-2 border-slate-200 font-bold text-slate-700 text-xl shadow-sm hover:-translate-y-1 transition";
                    btn.innerText = item.title;
                    btn.onclick = () => {
                        this.state.currentIdx = idx;
                        this.startActivity(false); 
                    }
                    container.appendChild(btn);
                });
                this.switchScreen('screen-list');
            },

            startActivity: function(isRandom = true) {
                if (isRandom) {
                    this.state.currentIdx = Math.floor(Math.random() * this.data.length);
                } 
                this.state.autoScore = 0;
                const item = this.data[this.state.currentIdx];

                // --- THE TRANSMITTER ---
                if (item.id && this.state.mode) {
                    const newUrl = window.location.pathname + '?storyId=' + item.id + '&mode=' + this.state.mode;
                    window.history.replaceState(null, '', newUrl);
                }

                document.getElementById('act-title').innerText = item.title;
                const examImage = document.getElementById('exam-image');
                examImage.src = item.image_url; 
                
                examImage.onclick = () => app.openImageModal(item.image_url);

                const container = document.getElementById('questions-container');
                container.innerHTML = '';

                Object.keys(item.questions).forEach(qNum => {
                    const q = item.questions[qNum];
                    const block = document.createElement('div');
                    block.className = "bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm";
                    
                    let contentHtml = '';

                    if (q.type === 'complete') {
                        let sentenceHtml = q.sentence;
                        if (this.state.mode === 'classroom') {
                            const shortAns = q.answers.reduce((a, b) => a.length <= b.length ? a : b);
                            sentenceHtml = sentenceHtml.replace(`[${qNum}]`, `<span class="class-gap" onclick="app.toggleClassGap(this, '${shortAns.replace(/'/g, "\\'")}', '${qNum}')">[ ${qNum} ]</span>`);
                        } else {
                            sentenceHtml = sentenceHtml.replace(`[${qNum}]`, `<input type="text" id="input-${qNum}" class="story-input" autocomplete="off">`);
                        }
                        contentHtml = `<div class="text-xl font-bold text-slate-700 mb-2"><span class="text-indigo-400 mr-2">${qNum}.</span>${sentenceHtml}</div>`;
                    
                    } else {
                        let questionPrompt = (qNum === '5' || qNum === '6') ? "Write a sentence about the picture." : q.sentence;
                        contentHtml = `<div class="text-xl font-bold text-slate-700 mb-4"><span class="text-indigo-400 mr-2">${qNum}.</span>${questionPrompt}</div>`;
                        
                        if (this.state.mode === 'classroom') {
                            contentHtml += `<button onclick="document.getElementById('ex-${qNum}').classList.toggle('hidden')" class="px-4 py-2 bg-indigo-100 text-indigo-700 font-bold rounded-lg hover:bg-indigo-200 transition">Show / Hide Example Answer</button>
                                            <div id="ex-${qNum}" class="hidden mt-3 text-lg font-bold text-green-600 bg-green-50 p-3 rounded-lg border border-green-200">${q.example}</div>`;
                        } else {
                            contentHtml += `<textarea id="input-${qNum}" rows="2" class="sentence-input" placeholder="Type your sentence here..."></textarea>
                                            
                                            <div id="score-area-${qNum}" class="hidden mt-4 pt-4 border-t-2 border-slate-100 flex items-center justify-between">
                                                <div class="text-sm text-slate-500"><span class="font-bold text-slate-700">Example:</span> ${q.example}</div>
                                                <div class="flex items-center gap-3">
                                                    <span class="text-sm font-bold text-slate-400 uppercase tracking-wider">Marks:</span>
                                                    <select id="score-${qNum}" class="score-select" onchange="app.updateTotalScore()">
                                                        <option value="0">0</option>
                                                        <option value="1">1</option>
                                                        <option value="2" selected>2</option>
                                                    </select>
                                                </div>
                                            </div>`;
                        }
                    }

                    block.innerHTML = contentHtml;
                    container.appendChild(block);
                });

                this.switchScreen('screen-activity');

                if (this.state.mode === 'exam') {
                    document.getElementById('btn-check').classList.remove('hidden');
                    document.getElementById('btn-finish').classList.add('hidden');
                    document.getElementById('score-tally').classList.add('hidden');
                } else {
                    document.getElementById('btn-check').classList.add('hidden');
                    document.getElementById('btn-finish').classList.remove('hidden');
                    document.getElementById('score-tally').classList.add('hidden');
                }
            },

            toggleClassGap: function(el, answer, id) {
                if (el.classList.contains('revealed')) {
                    el.innerText = `[ ${id} ]`;
                    el.classList.remove('revealed');
                } else {
                    el.innerText = answer;
                    el.classList.add('revealed');
                }
            },

            openImageModal: function(imageUrl) {
                if (!imageUrl) return;
                
                const modal = document.getElementById('zoom-modal');
                const modalImage = document.getElementById('zoomed-image');
                
                modalImage.src = imageUrl;
                
                modal.classList.remove('hidden');
                modal.classList.add('visible');

                if (typeof PinchZoom !== 'undefined') {
                    this.zoomSpanner = new PinchZoom(modalImage, {
                        tapZoomFactor: 3, 
                        draggableUnzoomed: false, 
                    });
                } else {
                    console.error("The PinchZoom Whirl spanner did not load!");
                }
            },

            closeImageModal: function() {
                const modal = document.getElementById('zoom-modal');
                modal.classList.add('hidden');
                modal.classList.remove('visible'); 

                if (this.zoomSpanner) {
                    this.zoomSpanner.destroy();
                    this.zoomSpanner = null;
                }
            },

            checkAnswers: function() {
                const item = this.data[this.state.currentIdx];
                this.state.autoScore = 0;

                Object.keys(item.questions).forEach(qNum => {
                    const q = item.questions[qNum];
                    const input = document.getElementById(`input-${qNum}`);
                    if (!input) return;

                    input.disabled = true;

                    if (q.type === 'complete') {
                        const userText = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
                        const isCorrect = q.answers.some(ans => ans.toLowerCase() === userText);
                        
                        if (isCorrect) {
                            input.classList.add('correct');
                            this.state.autoScore += 1; 
                        } else {
                            input.classList.add('wrong');
                            const shortAns = q.answers.reduce((a, b) => a.length <= b.length ? a : b);
                            const correction = document.createElement('span');
                            correction.className = "text-sm bg-green-500 text-white px-2 py-1 ml-2 rounded shadow-sm";
                            correction.innerText = shortAns;
                            input.parentNode.insertBefore(correction, input.nextSibling);
                        }
                    } else {
                        document.getElementById(`score-area-${qNum}`).classList.remove('hidden');
                    }
                });

                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-finish').classList.remove('hidden');
                document.getElementById('score-tally').classList.remove('hidden');
                this.updateTotalScore();
            },

            updateTotalScore: function() {
                let manualScore = 0;
                [3, 4, 5, 6].forEach(qNum => {
                    const select = document.getElementById(`score-${qNum}`);
                    if (select) {
                        manualScore += parseInt(select.value);
                    }
                });
                const total = this.state.autoScore + manualScore;
                document.getElementById('current-score').innerText = total;
            },

            switchScreen: function(s) {
                ['screen-dashboard', 'screen-list', 'screen-activity'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('hidden');
                });
                document.getElementById(s).classList.remove('hidden');
            },

            showDashboard: function() {
                // Clear the parameters from the URL when going back to the menu
                window.history.replaceState(null, '', window.location.pathname);
                this.switchScreen('screen-dashboard');
            }
        };

        app.init();
    </script>
</body>
</html>
