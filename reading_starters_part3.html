<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starters Part 3: Spelling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #FDFBF7; min-height: 100vh; display: flex; flex-direction: column; margin: 0; padding: 0; }
        
        .btn-back { display: inline-block; background: linear-gradient(135deg, #00BCD4, #4DD0E1); color: black; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid white; cursor: pointer; transition: transform 0.2s; text-decoration: none;}
        .btn-back:hover { background-color: #555; transform: translateY(-2px); color: white; }

        /* Spelling Boxes (The empty squares) */
        .spell-box { width: 45px; height: 50px; border: 3px solid #cbd5e1; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; color: #334155; background-color: #f8fafc; text-transform: uppercase; margin: 0 4px; cursor: pointer; transition: all 0.2s; }
        .spell-box.filled { border-color: #4f46e5; background-color: #eef2ff; color: #4f46e5; border-bottom-width: 6px; }
        .spell-box.correct { border-color: #22c55e; background-color: #f0fdf4; color: #15803d; pointer-events: none; border-bottom-width: 6px;}
        .spell-box.wrong { border-color: #ef4444; background-color: #fef2f2; color: #b91c1c; border-bottom-width: 6px;}
        
        /* Jumbled Letter Tiles (The pieces to click) */
        .letter-tile { width: 40px; height: 45px; border: 2px solid #94a3b8; border-bottom-width: 5px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.25rem; font-weight: 900; color: #475569; background-color: white; text-transform: uppercase; margin: 0 4px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
        .letter-tile:hover { transform: translateY(-2px); border-color: #4f46e5; color: #4f46e5; }
        .letter-tile.used { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Classroom Mode Button */
        .reveal-btn { padding: 10px 20px; border: 3px dashed #cbd5e1; border-radius: 12px; font-weight: bold; color: #64748b; background: white; cursor: pointer; transition: all 0.2s; margin-left: 15px;}
        .reveal-btn:hover { border-color: #4f46e5; color: #4f46e5; background: #eef2ff; }
        .reveal-btn.done { border-color: #22c55e; color: #22c55e; background: #f0fdf4; pointer-events: none; border-style: solid; }
    </style>
<script data-goatcounter="https://TeflTools.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body class="p-4 sm:p-8">

    <div class="w-full max-w-5xl mx-auto mt-2 bg-white shadow-xl rounded-3xl border-4 border-slate-100 flex flex-col min-h-[85vh] overflow-hidden">
        
        <div class="bg-white border-b-2 border-slate-100 p-4 md:p-6 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-6">
                <a href="reading_kids_index.html" class="btn-back">← Menu</a>
                <h1 class="text-2xl font-extrabold text-slate-800">Starters <span class="text-indigo-500">Part 3</span></h1>
            </div>
        </div>

        <div class="flex-1 overflow-hidden relative flex flex-col">
            
            <div id="screen-dashboard" class="flex-1 flex flex-col items-center justify-center p-8 overflow-y-auto">
                <h3 class="text-3xl font-bold mb-8 text-center text-slate-600">Choose how to play!</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full mb-10 max-w-3xl">
                    <button onclick="app.selectMode('classroom')" id="mode-classroom" class="flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50">
                        <span class="text-6xl mb-4">👨‍🏫</span>
                        <span class="text-3xl font-bold text-slate-700">Classroom</span>
                        <span class="text-lg mt-2">Click to reveal letters one by one.</span>
                    </button>
                    <button onclick="app.selectMode('exam')" id="mode-exam" class="flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50">
                        <span class="text-6xl mb-4">📝</span>
                        <span class="text-3xl font-bold text-slate-700">Exam Practice</span>
                        <span class="text-lg mt-2">Click letters to spell the word. 5 Marks.</span>
                    </button>
                </div>
                <div class="flex flex-col items-center gap-4">
                    <button onclick="app.startActivity()" id="start-btn" disabled class="px-12 py-4 bg-indigo-500 text-white rounded-2xl font-bold text-2xl transition hover:bg-indigo-600 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed">Loading Database... ⏳</button>
                    <button onclick="app.showList()" id="btn-list" disabled class="text-slate-400 font-bold hover:text-indigo-500 text-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">or Pick from List</button>
                </div>
            </div>

            <div id="screen-list" class="hidden flex-1 overflow-y-auto p-8 flex flex-col w-full bg-slate-50">
                <h2 class="text-4xl font-black text-slate-800 mb-6 text-center">Choose a Task</h2>
                <div id="list-container" class="space-y-4 pb-10 flex-1 max-w-3xl mx-auto w-full"></div>
                <div class="flex justify-center mt-4"><button onclick="app.showDashboard()" class="px-8 py-3 font-bold text-white rounded-xl bg-slate-400 hover:bg-slate-500 shadow-sm transition">Back</button></div>
            </div>

            <div id="screen-activity" class="hidden flex-1 flex flex-col bg-slate-50 overflow-y-auto">
                <div class="p-8 max-w-4xl mx-auto w-full space-y-8 pb-24">
                    <h3 class="text-2xl font-black text-slate-400 uppercase tracking-widest text-center mb-8">Look at the pictures. Look at the letters. Write the words.</h3>
                    <div id="questions-container" class="space-y-6">
                        </div>
                </div>
            </div>

            <div id="bottom-bar" class="hidden p-6 bg-white border-t-2 border-slate-200 flex justify-between items-center shadow-inner mt-auto relative z-50">
                <div id="score-tally" class="hidden text-2xl font-black text-indigo-600 bg-indigo-50 px-6 py-2 rounded-xl border-2 border-indigo-200">Score: <span id="current-score">0</span> / 5</div>
                <button id="btn-check" onclick="app.checkAnswers()" class="hidden px-8 py-4 rounded-xl font-bold text-xl bg-green-500 text-white hover:bg-green-600 transition shadow-md ml-auto">Check Answers ✓</button>
                <div id="post-check-btns" class="hidden flex gap-4 ml-auto">
                    <button onclick="location.reload()" class="px-6 py-3 rounded-xl font-bold text-lg bg-amber-400 text-amber-900 hover:bg-amber-500 shadow-md transition">Try Another</button>
                    <button onclick="app.showDashboard()" class="px-6 py-3 rounded-xl font-bold text-lg bg-slate-400 text-white hover:bg-slate-500 shadow-md transition">Menu</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // PASTE YOUR SUPABASE KEYS HERE
        const SUPABASE_URL = "https://ehhkjhyanmovymjqlxwo.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaGtqaHlhbm1vdnltanFseHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczODI3NzQsImV4cCI6MjA4Mjk1ODc3NH0.LIbusFxccfDl_Jxf3NO0CIKo4WRUA-88R9bQwQ1QWuk";


        const app = {
            supabase: null,
            data: [], 
            state: { mode: null, currentIdx: 0, placements: {}, letterBanks: {}, revealCounts: {} },

            getParams: function() {
                const params = new URLSearchParams(window.location.search);
                return { storyId: params.get('storyId'), mode: params.get('mode') }; 
            },

            startApp: async function() {
                await this.loadData();
                if (this.data.length > 0) {
                    document.getElementById('start-btn').innerText = "Let's Go! →";
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('btn-list').disabled = false;
                } else {
                    document.getElementById('start-btn').innerText = "No tasks found!";
                }
            },

            startSharedApp: async function(extensions) {
                try {
                    const { data, error } = await this.supabase
                        .from('reading_materials')
                        .select('material_data')
                        .eq('exam_part', 3)
                        .eq('exam_level', 'Starters') 
                        .eq('material_data->>id', extensions.storyId); 

                    if (error || data.length === 0) throw error;

                    this.data = [data[0].material_data]; 
                    this.state.currentIdx = 0; 
                    document.getElementById('start-btn').innerText = "Let's Go! →";
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('btn-list').disabled = false;
                } catch (e) {
                    await this.startApp();
                }
            },

            init: async function() {
                if (typeof supabase !== 'undefined') {
                    this.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    const extensions = this.getParams();

                    if (extensions.storyId) await this.startSharedApp(extensions);
                    else await this.startApp();

                    if (extensions.mode) {
                        this.selectMode(extensions.mode);
                        if (this.data.length > 0) this.startActivity(false); 
                    }
                }
            },

            loadData: async function() {
                try {
                    const { data, error } = await this.supabase
                        .from('reading_materials')
                        .select('material_data')
                        .eq('exam_level', 'Starters')
                        .eq('exam_part', 3);
                    if (error) throw error;
                    this.data = data.map(row => row.material_data);
                } catch (e) {
                    document.getElementById('start-btn').innerText = "Error connecting! ❌";
                }
            },

            selectMode: function(m) {
                this.state.mode = m;
                document.getElementById('mode-classroom').className = m === 'classroom' ? "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-indigo-400 bg-indigo-50 text-indigo-700 transition-all cursor-pointer min-h-[160px] shadow-md transform -translate-y-1" : "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50";
                document.getElementById('mode-exam').className = m === 'exam' ? "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-indigo-400 bg-indigo-50 text-indigo-700 transition-all cursor-pointer min-h-[160px] shadow-md transform -translate-y-1" : "flex flex-col items-center justify-center p-6 rounded-3xl border-4 border-gray-100 bg-white text-gray-500 transition-all cursor-pointer min-h-[160px] hover:border-indigo-300 hover:bg-indigo-50";

                if (this.data.length > 0) {
                    document.getElementById('start-btn').disabled = false;
                    document.getElementById('btn-list').disabled = false;
                }
            },

            showList: function() {
                const container = document.getElementById('list-container');
                container.innerHTML = '';
                this.data.forEach((item, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-5 bg-white rounded-2xl hover:bg-indigo-50 border-2 border-slate-200 font-bold text-slate-700 text-xl shadow-sm hover:-translate-y-1 transition";
                    btn.innerText = item.title;
                    btn.onclick = () => { this.state.currentIdx = idx; this.startActivity(false); }
                    container.appendChild(btn);
                });
                this.switchScreen('screen-list');
            },

            startActivity: function(isRandom = true) {
                if (isRandom) this.state.currentIdx = Math.floor(Math.random() * this.data.length);
                const item = this.data[this.state.currentIdx];
                
                // Reset memories
                this.state.placements = {}; 
                this.state.letterBanks = {};
                this.state.revealCounts = {};

                if (item.id && this.state.mode) {
                    const newUrl = window.location.pathname + '?storyId=' + item.id + '&mode=' + this.state.mode;
                    window.history.replaceState(null, '', newUrl);
                }

                const qContainer = document.getElementById('questions-container');
                qContainer.innerHTML = '';
                
                item.questions.forEach((q) => {
                    const wordLength = q.answer.length;
                    this.state.placements[q.id] = new Array(wordLength).fill(null);
                    this.state.revealCounts[q.id] = 0;
                    
                    // Build the letter bank logic for exam mode
                    const jumbledArray = q.jumbled.split(' ').filter(c => c.trim() !== '');
                    this.state.letterBanks[q.id] = jumbledArray.map((char, index) => ({ char, used: false, id: index }));

                    const block = document.createElement('div');
                    block.className = "flex flex-col md:flex-row items-center justify-between gap-6 p-6 bg-white rounded-2xl border-4 border-slate-100 shadow-sm";
                    
                    const emojiHtml = `<div class="text-6xl min-w-[80px] text-center">${q.emoji}</div>`;
                    
                    // Create the empty boxes
                    let boxesHtml = `<div class="flex items-center justify-center flex-1" id="boxes-container-${q.id}">`;
                    for(let i=0; i<wordLength; i++) {
                        if(this.state.mode === 'exam') {
                            boxesHtml += `<span class="spell-box" id="box-${q.id}-${i}" onclick="app.removeLetter(${q.id}, ${i})"></span>`;
                        } else {
                            boxesHtml += `<span class="spell-box" id="box-${q.id}-${i}"></span>`;
                        }
                    }
                    boxesHtml += `</div>`;

                    // Create the controls (Tiles for Exam, Button for Classroom)
                    let controlsHtml = `<div class="flex items-center justify-center" id="controls-container-${q.id}">`;
                    if (this.state.mode === 'classroom') {
                        controlsHtml += `<button id="reveal-${q.id}" class="reveal-btn" onclick="app.revealNextLetter(${q.id}, '${q.answer}')">Next Letter</button>`;
                    } else {
                        this.state.letterBanks[q.id].forEach(letterObj => {
                            controlsHtml += `<span class="letter-tile" id="tile-${q.id}-${letterObj.id}" onclick="app.placeLetter(${q.id}, ${letterObj.id})">${letterObj.char}</span>`;
                        });
                    }
                    controlsHtml += `</div>`;

                    block.innerHTML = emojiHtml + boxesHtml + controlsHtml;
                    qContainer.appendChild(block);
                });

                this.switchScreen('screen-activity');
                document.getElementById('bottom-bar').classList.remove('hidden');
                
                if (this.state.mode === 'exam') {
                    document.getElementById('btn-check').classList.remove('hidden');
                    document.getElementById('post-check-btns').classList.add('hidden');
                    document.getElementById('score-tally').classList.add('hidden');
                } else {
                    document.getElementById('btn-check').classList.add('hidden');
                    document.getElementById('post-check-btns').classList.remove('hidden');
                    document.getElementById('score-tally').classList.add('hidden');
                }
            },

            revealNextLetter: function(qId, answer) {
                const currentCount = this.state.revealCounts[qId];
                
                if (currentCount < answer.length) {
                    const box = document.getElementById(`box-${qId}-${currentCount}`);
                    box.innerText = answer[currentCount];
                    box.classList.add('filled');
                    this.state.revealCounts[qId]++;
                }

                if (this.state.revealCounts[qId] === answer.length) {
                    const btn = document.getElementById(`reveal-${qId}`);
                    btn.classList.add('done');
                    btn.innerText = "Done ✓";
                }
            },

            placeLetter: function(qId, tileId) {
                const bank = this.state.letterBanks[qId];
                const letterObj = bank.find(l => l.id === tileId);
                
                if(letterObj.used) return; // Already in a box

                const placements = this.state.placements[qId];
                const firstEmptyIndex = placements.indexOf(null);
                
                if(firstEmptyIndex !== -1) {
                    // Put it in the memory
                    placements[firstEmptyIndex] = letterObj;
                    letterObj.used = true;

                    // Update the screen
                    const box = document.getElementById(`box-${qId}-${firstEmptyIndex}`);
                    box.innerText = letterObj.char;
                    box.classList.add('filled');

                    const tile = document.getElementById(`tile-${qId}-${tileId}`);
                    tile.classList.add('used');
                }
            },

            removeLetter: function(qId, boxIndex) {
                const placements = this.state.placements[qId];
                const letterObj = placements[boxIndex];
                
                if(letterObj) {
                    // Remove from memory
                    letterObj.used = false;
                    placements[boxIndex] = null;

                    // Update screen
                    const box = document.getElementById(`box-${qId}-${boxIndex}`);
                    box.innerText = "";
                    box.classList.remove('filled');

                    const tile = document.getElementById(`tile-${qId}-${letterObj.id}`);
                    tile.classList.remove('used');
                }
            },

            checkAnswers: function() {
                const item = this.data[this.state.currentIdx];
                let score = 0;

                item.questions.forEach(q => {
                    const placements = this.state.placements[q.id];
                    // Map over placements, if null return empty string, else return the char
                    const userSpelling = placements.map(p => p ? p.char : '').join('').toLowerCase();
                    const correctSpelling = q.answer.toLowerCase();

                    // Lock the boxes and tiles
                    for(let i=0; i < q.answer.length; i++){
                        const box = document.getElementById(`box-${q.id}-${i}`);
                        box.style.pointerEvents = 'none';
                        
                        if (userSpelling === correctSpelling) {
                            box.classList.add('correct');
                        } else {
                            box.classList.add('wrong');
                        }
                    }

                    if (userSpelling === correctSpelling) {
                        score++;
                    } else {
                        // Display correct answer beside it
                        const container = document.getElementById(`controls-container-${q.id}`);
                        container.innerHTML = `<span class="text-green-600 font-bold text-xl uppercase tracking-widest bg-green-50 px-4 py-2 rounded-lg border-2 border-green-200">✓ ${q.answer}</span>`;
                    }
                });

                document.getElementById('current-score').innerText = score;
                document.getElementById('score-tally').classList.remove('hidden');
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('post-check-btns').classList.remove('hidden');
            },

            switchScreen: function(s) {
                ['screen-dashboard', 'screen-list', 'screen-activity'].forEach(id => {
                    document.getElementById(id).classList.add('hidden');
                });
                document.getElementById(s).classList.remove('hidden');
                if (s !== 'screen-activity') document.getElementById('bottom-bar').classList.add('hidden');
            },

            showDashboard: function() { 
                window.history.replaceState(null, '', window.location.pathname);
                this.switchScreen('screen-dashboard'); 
            }
        };

        app.init();
    </script>
</body>
</html>
