<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Noughts & Crosses</title>
    <link rel="icon" type="image/png" href="gameicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #00BCD4, #4DD0E1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden; /* Prevents accidental scrolling on the board */
        }

        #app-container {
            width: 100%;
            max-width: 1200px; 
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
        }

        /* Setup Screen Upload Button */
        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
            width: 100%;
            max-width: 500px;
            border: 4px dashed #cbd5e1;
            border-radius: 16px;
            cursor: pointer;
            background-color: #f8fafc;
            transition: all 0.2s;
            color: #64748b;
            font-weight: bold;
        }
        .file-upload-label:hover {
            border-color: #00BCD4; color: #00BCD4; background-color: #ecfeff;
        }

        /* Game Board Styles - Front and Centre */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 420px; /* Slightly tighter to save space */
            margin: 0 auto;
        }

        .board-cell {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            background-color: #f1f5f9;
            color: #94a3b8;
            font-weight: bold;
            font-size: 1.5rem;
            transition: all 0.2s;
            border: 4px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            line-height: 1;
        }

        .board-cell:hover:not(:disabled) {
            background-color: white; border-color: #67e8f9; color: #06b6d4;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px); cursor: pointer;
        }

        .board-cell:disabled { cursor: default; opacity: 1; }

        .marker-x { background-color: #cffafe; color: #0891b2; font-size: 6rem; border-color: #a5f3fc; }
        .marker-o { background-color: #ffedd5; color: #ea580c; font-size: 6rem; border-color: #fed7aa; }

        /* Active Question Box - Now Horizontal */
        #word-frame { transition: all 0.3s; width: 100%; max-width: 900px; margin: 0 auto; }
        .frame-inactive { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }
        .frame-active { opacity: 1; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border-color: #06b6d4; }
    </style>
</head>
<body>

    <div id="app-container">

        <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-2">
            <button onclick="window.location.href = 'index.html'" class="text-slate-400 hover:text-cyan-600 font-bold flex items-center gap-2 text-lg transition">
                ← Back
            </button>
            <h1 class="text-3xl font-black text-slate-800 uppercase tracking-wide text-center">Noughts & Crosses</h1>
            <div class="w-20"></div>
        </div>

        <div id="setup-screen" class="flex flex-col items-center justify-center py-10">
            <h2 class="text-2xl font-bold text-slate-600 mb-6">Load your vocabulary list</h2>
            <label class="file-upload-label">
                <span class="text-5xl mb-2">📂</span>
                <span id="file-label-text" class="text-xl">Click to Select CSV</span>
                <input type="file" id="csv-file-input" accept=".csv" style="display: none;">
            </label>
            <p id="setup-error" class="text-red-500 text-lg font-bold mt-4 hidden">No valid words found in file.</p>
        </div>

        <div id="game-screen" class="hidden flex-col items-center w-full">
            
            <div class="w-full flex justify-between items-center mb-4 bg-slate-50 p-3 rounded-xl max-w-[900px]">
                <button id="reset-setup-button" class="text-base font-bold text-slate-500 hover:text-slate-800 underline">
                    Change List
                </button>
                <div id="turn-indicator" class="px-6 py-2 bg-white border border-slate-200 rounded-full shadow-sm flex items-center gap-2">
                    <span class="text-base font-bold text-slate-400 uppercase">Turn:</span>
                    <span id="turn-badge" class="font-black text-2xl text-cyan-600">Player X</span>
                </div>
            </div>

            <div class="w-full flex justify-center mb-6">
                <div id="grid-frame" class="game-grid"></div>
            </div>

            <div id="word-frame" class="bg-white border-4 border-slate-100 rounded-2xl p-6 frame-inactive flex flex-row justify-between items-center gap-6 min-h-[120px]">
                
                <div class="flex-1 flex flex-col justify-center text-left">
                    <p id="instruction-text" class="text-sm font-bold text-slate-400 uppercase mb-1">
                        Click a square to reveal a word
                    </p>
                    <div id="word-label" class="text-4xl font-black text-slate-800 break-words leading-none">...</div>
                </div>

                <div class="flex gap-4 shrink-0">
                    <button id="correct-button" class="px-8 py-4 text-xl bg-green-500 text-white font-black rounded-xl shadow-md hover:bg-green-600 active:scale-95 transition disabled:opacity-50" disabled>
                        ✔ Correct
                    </button>
                    <button id="incorrect-button" class="px-8 py-4 text-xl bg-red-500 text-white font-black rounded-xl shadow-md hover:bg-red-600 active:scale-95 transition disabled:opacity-50" disabled>
                        ✘ Incorrect
                    </button>
                </div>
            </div>

            <div class="mt-4 w-full max-w-[900px]">
                <button id="new-game-button" class="hidden w-full py-4 text-xl bg-cyan-600 text-white font-black rounded-xl hover:bg-cyan-700 transition shadow-lg">
                    Play Again
                </button>
            </div>
            
        </div>

        <div id="message-modal" class="fixed inset-0 bg-slate-900 bg-opacity-70 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
            <div class="bg-white rounded-3xl p-10 shadow-2xl max-w-md w-full text-center">
                <div id="modal-icon" class="text-6xl mb-4">🏆</div>
                <h3 id="modal-title" class="text-3xl font-black mb-2 text-slate-800">Title</h3>
                <p id="modal-message" class="text-xl text-slate-600 font-medium mb-6">Message</p>
                <button id="modal-ok-button" class="w-full py-4 text-xl bg-slate-800 text-white font-black rounded-xl hover:bg-slate-900 transition">
                    OK
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- State ---
        let vocabulary = [];
        let board = Array.from({ length: 3 }, () => Array.from({ length: 3 }, () => '')); 
        let playerTurn = 'X';
        let selectedWordInfo = null;
        let gameActive = false;
        let currentVocab = [];
        let currentSquare = null;
        let boardButtons = []; 

        // --- Elements ---
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const csvFileInput = document.getElementById('csv-file-input');
        const fileLabelText = document.getElementById('file-label-text');
        const setupError = document.getElementById('setup-error');
        const resetSetupBtn = document.getElementById('reset-setup-button');
        
        const gridFrame = document.getElementById('grid-frame');
        const wordFrame = document.getElementById('word-frame');
        const wordLabel = document.getElementById('word-label');
        const instructionText = document.getElementById('instruction-text');
        const correctButton = document.getElementById('correct-button');
        const incorrectButton = document.getElementById('incorrect-button');
        const newGameButton = document.getElementById('new-game-button');
        const turnBadge = document.getElementById('turn-badge');
        
        const messageModal = document.getElementById('message-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');

        // --- View Switching ---
        function showGameScreen() {
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            gameScreen.classList.add('flex');
        }

        resetSetupBtn.addEventListener('click', () => { window.location.reload(); });

        // --- Modal ---
        function showCustomMessage(title, message, icon = 'ℹ️') {
            document.getElementById('modal-icon').textContent = icon;
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            messageModal.classList.remove('hidden');
            messageModal.classList.add('flex');
        }

        document.getElementById('modal-ok-button').addEventListener('click', () => {
            messageModal.classList.add('hidden');
            messageModal.classList.remove('flex');
        });

        // --- Board Setup ---
        function setupBoardButtons() {
            gridFrame.innerHTML = '';
            boardButtons = [];
            for (let r = 0; r < 3; r++) {
                boardButtons[r] = [];
                for (let c = 0; c < 3; c++) {
                    const button = document.createElement('button');
                    button.innerHTML = `?`; 
                    button.className = 'board-cell';
                    button.disabled = true; 
                    button.addEventListener('click', () => onButtonClick(r, c));
                    gridFrame.appendChild(button);
                    boardButtons[r][c] = button;
                }
            }
        }

        // --- File Loading ---
        csvFileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;
            fileLabelText.textContent = file.name;
            vocabulary = [];
            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                lines.forEach(line => {
                    const word = line.split(',')[0].trim().toUpperCase();
                    if (word && /^[A-Z\s]+$/.test(word)) vocabulary.push({ word: word });
                });
                if (vocabulary.length === 0) {
                    setupError.classList.remove('hidden');
                } else {
                    setupError.classList.add('hidden');
                    showGameScreen();
                    startNewGame();
                }
            };
            reader.readAsText(file);
        });

        // --- Game Logic ---
        function startNewGame() {
            board = Array.from({ length: 3 }, () => Array.from({ length: 3 }, () => ''));
            playerTurn = 'X';
            gameActive = true;
            wordLabel.textContent = "...";
            correctButton.disabled = true;
            incorrectButton.disabled = true;
            newGameButton.classList.add('hidden');
            updateTurnBadge();
            wordFrame.classList.remove('frame-active');
            wordFrame.classList.add('frame-inactive');
            instructionText.textContent = "Click a square to reveal a word";
            currentVocab = [...vocabulary];

            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const btn = boardButtons[r][c];
                    btn.innerHTML = `?`;
                    btn.disabled = false;
                    btn.className = 'board-cell'; 
                }
            }
        }

        function updateTurnBadge() {
            turnBadge.textContent = `Player ${playerTurn}`;
            if(playerTurn === 'X') {
                turnBadge.className = "font-black text-2xl text-cyan-600";
            } else {
                turnBadge.className = "font-black text-2xl text-orange-500";
            }
        }

        function onButtonClick(r, c) {
            if (!gameActive || board[r][c] !== '') return;
            if (currentVocab.length === 0) currentVocab = [...vocabulary]; 

            const randomIndex = Math.floor(Math.random() * currentVocab.length);
            selectedWordInfo = currentVocab[randomIndex];
            currentVocab.splice(randomIndex, 1); 
            currentSquare = [r, c];
            
            wordLabel.textContent = selectedWordInfo.word;
            wordFrame.classList.remove('frame-inactive');
            wordFrame.classList.add('frame-active');
            instructionText.textContent = `Does Player ${playerTurn} know this word?`;
            boardButtons.flat().forEach(btn => btn.disabled = true);
            correctButton.disabled = false;
            incorrectButton.disabled = false;
        }

        function checkAnswer(isCorrect) {
            const [r, c] = currentSquare;
            if (isCorrect) {
                board[r][c] = playerTurn;
                const btn = boardButtons[r][c];
                btn.innerHTML = playerTurn;
                btn.classList.add(playerTurn === 'X' ? 'marker-x' : 'marker-o');
                if (checkWin()) { endGame(`Player ${playerTurn} Wins!`, '🏆'); return; }
                if (board.flat().every(cell => cell !== '')) { endGame("It's a Draw!", '🤝'); return; }
                playerTurn = playerTurn === 'X' ? 'O' : 'X';
                updateTurnBadge();
            } else {
                currentVocab.push(selectedWordInfo);
                playerTurn = playerTurn === 'X' ? 'O' : 'X';
                updateTurnBadge();
            }
            wordLabel.textContent = "...";
            wordFrame.classList.remove('frame-active');
            wordFrame.classList.add('frame-inactive');
            correctButton.disabled = true;
            incorrectButton.disabled = true;
            instructionText.textContent = "Click a square to reveal a word";

            if (gameActive) {
                for (let i = 0; i < 3; i++) {
                    for (let j = 0; j < 3; j++) {
                        if (board[i][j] === '') boardButtons[i][j].disabled = false;
                    }
                }
            }
        }

        function checkWin() {
            const lines = [
                [[0,0],[0,1],[0,2]], [[1,0],[1,1],[1,2]], [[2,0],[2,1],[2,2]], 
                [[0,0],[1,0],[2,0]], [[0,1],[1,1],[2,1]], [[0,2],[1,2],[2,2]], 
                [[0,0],[1,1],[2,2]], [[0,2],[1,1],[2,0]] 
            ];
            return lines.some(line => {
                const [a, b, c] = line;
                return board[a[0]][a[1]] && board[a[0]][a[1]] === board[b[0]][b[1]] && board[a[0]][a[1]] === board[c[0]][c[1]];
            });
        }

        function endGame(msg, icon) {
            gameActive = false;
            newGameButton.classList.remove('hidden');
            showCustomMessage("Game Over", msg, icon);
        }

        setupBoardButtons();
        correctButton.addEventListener('click', () => checkAnswer(true));
        incorrectButton.addEventListener('click', () => checkAnswer(false));
        newGameButton.addEventListener('click', startNewGame);

    </script>
</body>
</html>
