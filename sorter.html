<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorisation Challenge</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f4f8; 
        }
        
        /* --- Game Board Styles --- */
        .game-column {
            transition: all 0.2s ease;
            min-height: 250px;
        }
        .game-column.target-active {
            background-color: #eef2ff; /* indigo-50 */
            border-color: #6366f1; /* indigo-500 */
            border-style: solid;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .word-card {
            cursor: grab;
            touch-action: manipulation;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            user-select: none;
        }
        .word-card:active { cursor: grabbing; }
        
        .word-card.selected {
            border-color: #f59e0b;
            background-color: #fef3c7;
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
            z-index: 50;
        }

        /* Feedback Styles */
        .word-card.correct { background-color: #d1fae5; border-color: #10b981; color: #065f46; }
        .word-card.incorrect { background-color: #fee2e2; border-color: #ef4444; color: #7f1d1d; }
        .word-card.was-incorrect { background-color: #fef9c3 !important; border: 3px solid #eab308 !important; color: #854d0e; position: relative; }
        .word-card.clone-answer { opacity: 0.8; border-style: dashed !important; }
    </style>
</head>
<body class="p-4 sm:p-8 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-6xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden min-h-[700px] flex flex-col relative">
        
        <div class="bg-white border-b border-gray-100 px-8 py-6 flex flex-col md:flex-row justify-between items-center gap-4 z-10">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <a href="?" class="px-4 py-2 text-sm font-bold text-gray-600 bg-white border border-gray-200 rounded-lg shadow-sm hover:shadow-md hover:bg-gray-50 transition">
                    ← Menu
                </a>
                <h1 class="text-3xl font-black text-gray-900">Category <span class="text-indigo-600">Sorter</span></h1>
            </div>
            <div id="timer-container" class="hidden bg-indigo-100 text-indigo-700 px-6 py-2 rounded-full font-black text-xl shadow-inner tracking-widest">
                00:00
            </div>
        </div>

        <div id="view-menu" class="flex-1 p-6 md:p-10 bg-gray-50 overflow-y-auto">
            
            <div class="flex flex-col md:flex-row gap-6 mb-10 items-stretch">
                
                <div class="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center">
                    <h3 class="text-lg font-bold text-gray-800 mb-3">Find an Exercise</h3>
                    <div class="relative w-full">
                        <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="Search titles or topics..." class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 font-medium text-gray-700 transition">
                        <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
                    </div>
                </div>

                <div class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-700 p-6 rounded-2xl shadow-lg text-white flex flex-col justify-center items-start relative overflow-hidden transition transform hover:-translate-y-1">
                    <div class="relative z-10 w-full">
                        <h3 class="text-xl font-black mb-2 flex items-center gap-2">📂 Upload Custom CSV</h3>
                        <p class="text-indigo-100 text-sm mb-4">Play a custom set instantly. Type words in multiple columns to accept multiple answers.</p>
                        <label class="cursor-pointer flex items-center justify-center w-full bg-white text-indigo-700 font-bold px-6 py-3 rounded-xl hover:bg-indigo-50 transition shadow-md">
                            <span>Select File</span>
                            <input type="file" accept=".csv, .txt" class="hidden" onchange="handleFileUpload(event)">
                        </label>
                    </div>
                    <div class="absolute -right-10 -top-10 w-48 h-48 bg-white opacity-10 rounded-full blur-3xl pointer-events-none"></div>
                </div>

            </div>

            <div class="flex justify-between items-center mb-6 border-b border-gray-200 pb-2">
                <h3 class="text-lg font-black text-gray-400 uppercase tracking-widest">Exercise Library</h3>
            </div>

            <div id="menu-container" class="space-y-4">
                <div class="text-indigo-500 font-bold animate-pulse text-center py-10 text-xl">⏳ Connecting to Database...</div>
            </div>
        </div>

        <div id="view-game" class="hidden flex-1 p-6 md:p-10 bg-gray-50 flex-col overflow-y-auto">
            
            <div class="mb-8 flex flex-col items-center">
                <div class="flex justify-between items-end mb-2 w-full max-w-2xl">
                    <h3 class="font-bold text-gray-400 uppercase tracking-widest text-sm">Up Next</h3>
                    <div class="text-sm font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-md"><span id="items-left">0</span> remaining</div>
                </div>
                <div id="spawn-zone" class="bg-white rounded-2xl p-6 min-h-[140px] w-full max-w-2xl flex justify-center items-center border border-gray-200 shadow-inner">
                    </div>
            </div>

            <div id="columns-container" class="grid gap-6 flex-1 w-full max-w-6xl mx-auto">
                </div>

            <div class="mt-10 pt-6 border-t border-gray-200 flex justify-center gap-4 flex-wrap">
                <button id="btn-check" onclick="checkAnswers()" class="hidden bg-indigo-600 text-white text-lg font-black px-10 py-4 rounded-xl shadow-lg hover:bg-indigo-700 hover:shadow-xl transition transform hover:-translate-y-1">
                    Check Answers
                </button>
                <button id="btn-solve" onclick="solveGame()" class="bg-white text-indigo-600 font-bold px-8 py-4 rounded-xl shadow-sm hover:bg-indigo-50 transition border border-gray-200">
                    Show Answers
                </button>
                <button onclick="location.reload()" class="bg-gray-800 text-white font-bold px-8 py-4 rounded-xl shadow-md hover:bg-gray-900 transition">
                    Restart
                </button>
            </div>
            
            <div id="result-message" class="text-center mt-6 text-xl font-bold"></div>
        </div>

    </div>

    <script>
        // --- DATABASE SETUP ---
        const SUPABASE_URL = "https://ehhkjhyanmovymjqlxwo.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaGtqaHlhbm1vdnltanFseHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczODI3NzQsImV4cCI6MjA4Mjk1ODc3NH0.LIbusFxccfDl_Jxf3NO0CIKo4WRUA-88R9bQwQ1QWuk";

        let supabaseClient = null;
        try { if(!SUPABASE_URL.includes('your-project')) supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } 
        catch(e) { console.error("Supabase Error", e); }

        let allSets = []; // Stores the database locally for fast searching
        let gameState = { categories: [], items: [], queue: [], timer: null, seconds: 0, selectedCard: null };

        // --- APP INITIALIZATION ---
        async function initApp() {
            const urlParams = new URLSearchParams(window.location.search);
            const setId = urlParams.get('id');

            if (setId) {
                // Load specific game from URL
                document.getElementById('view-menu').classList.add('hidden');
                document.getElementById('view-game').classList.remove('hidden');
                document.getElementById('view-game').classList.add('flex');
                
                if (!supabaseClient) { alert("Database not connected."); return; }
                const { data, error } = await supabaseClient.from('sorter_sets').select('*').eq('id', setId).single();
                if (error || !data) {
                    alert("Exercise not found. It may have been deleted.");
                    window.location.href = window.location.pathname; 
                    return;
                }
                loadGameFromSet(data);
            } else {
                // Fetch library and build menu
                await fetchDatabase();
            }
        }

        // --- MENU & SEARCH LOGIC ---
        async function fetchDatabase() {
            if (!supabaseClient) {
                document.getElementById('menu-container').innerHTML = '<div class="text-red-400 text-center font-bold">Database not connected. Please check configuration.</div>';
                return;
            }

            const { data, error } = await supabaseClient.from('sorter_sets').select('*').limit(200);
            
            if (error || !data) {
                document.getElementById('menu-container').innerHTML = '<div class="text-red-400 text-center font-bold">Could not load library.</div>';
                return;
            }

            // Alphabetize globally once
            allSets = data.sort((a, b) => a.title.localeCompare(b.title));
            renderMenu();
        }

        function handleSearch() { renderMenu(); }

        function renderMenu() {
            const menuContainer = document.getElementById('menu-container');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            menuContainer.innerHTML = '';

            const filteredSets = allSets.filter(set => {
                const titleMatch = set.title.toLowerCase().includes(searchTerm);
                const topicMatch = set.topic ? set.topic.toLowerCase().includes(searchTerm) : false;
                return titleMatch || topicMatch;
            });

            if (filteredSets.length === 0) {
                menuContainer.innerHTML = '<div class="text-gray-400 italic text-center py-6">No exercises match your search.</div>';
                return;
            }

            const groupedSets = {};
            filteredSets.forEach(set => {
                const level = set.level || 'Uncategorised';
                if (!groupedSets[level]) groupedSets[level] = [];
                groupedSets[level].push(set);
            });

            // 1. A dictionary of paint colours for the boxes
            const gradients = { 
                'kids': 'from-yellow-400 to-orange-500', 
                'A1': 'from-blue-300 to-blue-500', 
                'A2': 'from-blue-400 to-blue-600', 
                'B1': 'from-indigo-400 to-indigo-600', 
                'B2': 'from-indigo-500 to-indigo-700', 
                'C1': 'from-orange-400 to-pink-500', 
                'C2': 'from-green-500 to-emerald-700' 
            };

            Object.keys(groupedSets).sort().forEach(level => {
                const levelDiv = document.createElement('div');
                levelDiv.className = 'w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden';

                // 2. Look up the paint colour for this specific level
                const gradClass = gradients[level] || 'from-gray-500 to-gray-700';

                const levelButton = document.createElement('button');
                // 3. Paint the button and change the text colour to white
                levelButton.className = `w-full text-left font-black text-xl text-white p-5 flex justify-between items-center bg-gradient-to-r ${gradClass} hover:opacity-90 transition`;
                
                // 4. Update the text to add the colon and the word "sets"
                levelButton.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="bg-white/20 text-white px-3 py-1 rounded-lg text-sm shadow-inner">${groupedSets[level].length} sets</span>
                        <span>Level ${level}:</span>
                    </div>
                    <span class="text-white transform transition-transform duration-200">▼</span>
                `;

                const listDiv = document.createElement('div');
                if(searchTerm.length > 0) {
                    listDiv.className = 'flex flex-col gap-2 p-4 pt-0 bg-white border-t border-gray-50';
                    levelButton.querySelector('.text-white.transform').classList.add('rotate-180');
                } else {
                    listDiv.className = 'hidden flex-col gap-2 p-4 pt-0 bg-white border-t border-gray-50';
                }

                groupedSets[level].forEach(set => {
                    const linkButton = document.createElement('a');
                    linkButton.href = '?id=' + set.id; 
                    linkButton.className = 'block w-full text-left p-4 bg-gray-50 border border-gray-100 rounded-xl hover:bg-indigo-50 hover:border-indigo-200 transition group flex justify-between items-center mt-2';
                    linkButton.innerHTML = `
                        <div>
                            <div class="font-bold text-gray-800 group-hover:text-indigo-700 transition">${set.title}</div>
                            <div class="text-xs text-gray-400 uppercase font-bold tracking-wide mt-1">${set.topic || 'General'}</div>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-indigo-400 group-hover:bg-indigo-600 group-hover:text-white transition">▶</div>
                    `;
                    listDiv.appendChild(linkButton);
                });

                levelButton.onclick = () => {
                    const isHidden = listDiv.classList.contains('hidden');
                    if (isHidden) {
                        listDiv.classList.remove('hidden'); listDiv.classList.add('flex');
                        levelButton.querySelector('.text-white.transform').classList.add('rotate-180');
                    } else {
                        listDiv.classList.add('hidden'); listDiv.classList.remove('flex');
                        levelButton.querySelector('.text-white.transform').classList.remove('rotate-180');
                    }
                };

                levelDiv.appendChild(levelButton);
                levelDiv.appendChild(listDiv);
                menuContainer.appendChild(levelDiv);
            });
        }

                // --- CSV PARSER ---
                function handleFileUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => parseCSV(e.target.result);
                    reader.readAsText(file);
                }

                function parseCSV(csvText) {
                    const lines = csvText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    if (lines.length < 2) return;
                    const headers = lines[0].split(',').map(h => h.trim());
                    let itemMap = {}; 
                    
                    for (let i = 1; i < lines.length; i++) {
                        const rowData = lines[i].split(',');
                        rowData.forEach((cellText, colIndex) => {
                            const cleanText = cellText.trim();
                            const category = headers[colIndex];
                            if (cleanText !== "" && category) {
                                if (itemMap[cleanText]) itemMap[cleanText].category += "|" + category;
                                else itemMap[cleanText] = { text: cleanText, category: category };
                            }
                        });
                    }

                    let items = [];
                    let idCounter = 0;
                    Object.values(itemMap).forEach(item => {
                        items.push({ id: `csv-item-${idCounter++}`, text: item.text, category: item.category });
                    });
                    startGame(headers, items);
                }

        // --- GAME ENGINE ---
        function loadGameFromSet(set) {
            const headers = set.game_data.headers;
            let idCounter = 0;
            const items = set.game_data.items.map(item => ({
                id: `db-item-${idCounter++}`,
                text: item.text,
                category: item.category
            }));
            startGame(headers, items);
        }

        function startGame(categories, items) {
            gameState.categories = categories;
            gameState.items = items;
            gameState.queue = [...items].sort(() => Math.random() - 0.5);
            
            // Switch UI Views
            document.getElementById('view-menu').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            document.getElementById('view-game').classList.add('flex');
            document.getElementById('timer-container').classList.remove('hidden');

            buildBoard();
            startTimer();
            spawnNextCard();
        }

        function buildBoard() {
            const container = document.getElementById('columns-container');
            container.innerHTML = '';
            const colCount = gameState.categories.length;
            
            // Layout Adjustments based on column count
            container.className = "grid gap-6 flex-1 items-start w-full max-w-6xl mx-auto";
            if(colCount === 2) container.classList.add('grid-cols-2');
            else if(colCount === 3) container.classList.add('grid-cols-1', 'md:grid-cols-3');
            else if(colCount === 4) container.classList.add('grid-cols-2', 'lg:grid-cols-4');
            else container.classList.add('grid-cols-2', 'md:grid-cols-3', 'lg:grid-cols-4');

            gameState.categories.forEach(cat => {
                const col = document.createElement('div');
                col.className = "game-column bg-white rounded-2xl p-5 shadow-sm flex flex-col gap-3 relative border-2 border-dashed border-gray-300";
                col.innerHTML = `<h3 class="text-center font-black text-gray-500 uppercase tracking-widest border-b border-gray-100 pb-3 mb-2 pointer-events-none select-none">${cat}</h3>`;
                col.id = `col-${cat}`;
                col.dataset.category = cat;
                col.onclick = () => handleColumnClick(col);
                col.ondragover = (e) => { e.preventDefault(); col.classList.add('target-active'); };
                col.ondragleave = (e) => { col.classList.remove('target-active'); };
                col.ondrop = (e) => handleDrop(e, col);
                container.appendChild(col);
            });
        }

        function spawnNextCard() {
            const spawnZone = document.getElementById('spawn-zone');
            if (spawnZone.children.length > 0) return;
            if (gameState.queue.length === 0) {
                document.getElementById('items-left').innerText = "0";
                document.getElementById('btn-check').classList.remove('hidden');
                return;
            }
            const item = gameState.queue.pop();
            document.getElementById('items-left').innerText = gameState.queue.length;
            createCardDOM(item, spawnZone);
        }

        function createCardDOM(item, parent) {
            const div = document.createElement('div');
            div.className = "word-card bg-white border-2 border-gray-200 px-8 py-5 rounded-xl font-bold text-gray-800 shadow-md text-xl md:text-2xl w-full max-w-sm text-center";
            div.innerText = item.text;
            div.id = item.id;
            div.draggable = true;
            div.dataset.category = item.category;
            div.onclick = (e) => { e.stopPropagation(); selectCard(div); };
            div.ondragstart = (e) => { e.dataTransfer.setData("text", item.id); div.classList.add('opacity-50'); };
            div.ondragend = () => { div.classList.remove('opacity-50'); clearColumnHighlights(); };
            parent.appendChild(div);
        }

        function selectCard(cardEl) {
            if (gameState.selectedCard === cardEl) {
                cardEl.classList.remove('selected');
                gameState.selectedCard = null;
                clearColumnHighlights();
            } else {
                if (gameState.selectedCard) gameState.selectedCard.classList.remove('selected');
                gameState.selectedCard = cardEl;
                cardEl.classList.add('selected');
                document.querySelectorAll('.game-column').forEach(col => col.classList.add('target-active'));
            }
        }

        function handleColumnClick(colEl) { if (gameState.selectedCard) moveCardToColumn(gameState.selectedCard, colEl); }
        function handleDrop(e, colEl) { e.preventDefault(); const id = e.dataTransfer.getData("text"); const cardEl = document.getElementById(id); if (cardEl) moveCardToColumn(cardEl, colEl); }

        function moveCardToColumn(cardEl, colEl) {
            colEl.appendChild(cardEl);
            cardEl.className = "word-card bg-white border-2 border-gray-100 px-4 py-3 rounded-xl font-semibold text-gray-700 shadow-sm text-base w-full block hover:border-indigo-200"; 
            cardEl.classList.remove('selected', 'correct', 'incorrect');
            gameState.selectedCard = null;
            clearColumnHighlights();
            spawnNextCard();
        }

        function clearColumnHighlights() { document.querySelectorAll('.game-column').forEach(col => col.classList.remove('target-active')); }

        // --- CHECKING & SOLVING ---
        function checkAnswers() {
            let errors = 0;
            document.querySelectorAll('.game-column .word-card').forEach(card => {
                const parentCol = card.closest('.game-column');
                const correctCategories = card.dataset.category.split('|'); 
                if (correctCategories.includes(parentCol.dataset.category)) {
                    card.classList.add('correct'); card.classList.remove('incorrect');
                } else {
                    card.classList.add('incorrect'); card.classList.remove('correct'); errors++;
                }
            });

            const msgDiv = document.getElementById('result-message');
            if (errors === 0) {
                clearInterval(gameState.timer);
                document.getElementById('timer-container').classList.remove('bg-indigo-100', 'text-indigo-700');
                document.getElementById('timer-container').classList.add('bg-green-500', 'text-white');
                msgDiv.innerHTML = `<span class="text-green-600 text-3xl flex items-center justify-center gap-2">🎉 Perfect Score!</span>`;
                document.getElementById('btn-check').classList.add('hidden');
                document.getElementById('btn-solve').classList.add('hidden');
            } else {
                msgDiv.innerHTML = `<span class="text-red-500 bg-red-50 px-6 py-2 rounded-lg border border-red-200">You have ${errors} errors. Keep trying!</span>`;
            }
        }

        function solveGame() {
            clearInterval(gameState.timer);

            document.querySelectorAll('.game-column .word-card').forEach(card => {
                const currentParent = card.parentElement;
                const correctCategories = card.dataset.category.split('|');
                if (currentParent.classList.contains('game-column')) {
                    if (correctCategories.includes(currentParent.dataset.category)) card.classList.add('correct');
                    else card.classList.add('was-incorrect');
                }
            });

            const placeInCorrectColumns = (card) => {
                const correctCats = card.dataset.category.split('|');
                const styleClass = card.classList.contains('was-incorrect') ? "was-incorrect" : (card.classList.contains('correct') ? "correct" : "");

                correctCats.forEach((cat, index) => {
                    const col = document.getElementById(`col-${cat}`);
                    if (col) {
                        let cardToPlace;
                        if (index === 0 && card.parentElement !== col) cardToPlace = card;
                        else if (index === 0 && card.parentElement === col) cardToPlace = card;
                        else {
                             cardToPlace = card.cloneNode(true);
                             cardToPlace.id = card.id + "-clone-" + index;
                             cardToPlace.classList.add('clone-answer'); 
                        }
                        cardToPlace.className = "word-card px-4 py-3 rounded-xl font-semibold shadow-sm text-base mb-2 w-full block " + styleClass;
                        if(styleClass === "") cardToPlace.className += " bg-white border-2 border-gray-100 text-gray-700";
                        if(cardToPlace.parentElement !== col) col.appendChild(cardToPlace);
                    }
                });
            };

            while(gameState.queue.length > 0) {
                const item = gameState.queue.pop();
                const div = document.createElement('div');
                div.innerText = item.text; div.dataset.category = item.category;
                placeInCorrectColumns(div);
            }

            const spawnZone = document.getElementById('spawn-zone');
            while(spawnZone.children.length > 0) placeInCorrectColumns(spawnZone.children[0]);

            const originalCards = Array.from(document.querySelectorAll('.game-column .word-card')).filter(c => !c.id.includes('-clone-'));
            originalCards.forEach(card => placeInCorrectColumns(card));

            document.getElementById('items-left').innerText = "0";
            document.getElementById('btn-check').classList.add('hidden');
            document.getElementById('btn-solve').classList.add('hidden');
            document.getElementById('result-message').innerHTML = `<span class="text-indigo-600 text-2xl font-black">Answers Revealed</span><div class="text-yellow-600 text-sm font-bold mt-1 uppercase tracking-widest">(Yellow items were incorrect)</div>`;
        }

        function startTimer() {
            gameState.seconds = 0;
            if(gameState.timer) clearInterval(gameState.timer);
            gameState.timer = setInterval(() => {
                gameState.seconds++;
                const m = Math.floor(gameState.seconds / 60).toString().padStart(2, '0');
                const s = (gameState.seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-container').innerText = `${m}:${s}`;
            }, 1000);
        }

        // Kick off
        window.onload = initApp;

    </script>
</body>
</html>
