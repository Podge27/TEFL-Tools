<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Jeopardy</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0f4f8; 
            margin: 0;
            padding: 0;
        }

        .btn-back {
            display: inline-block;
            background: linear-gradient(135deg, #00BCD4, #4DD0E1);
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid white;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #555;
            transform: translateY(-2px);
        }

        .jeopardy-btn {
            transition: all 0.2s ease;
        }
        .jeopardy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background-color: #e5e7eb; 
            color: #9ca3af; 
            border-color: #d1d5db; 
            box-shadow: none;
            transform: none !important;
        }
        .jeopardy-btn.completed {
            visibility: hidden; 
        }
    </style>
</head>
<body class="p-4 sm:p-8 flex flex-col items-center justify-center min-h-screen">

    <div class="w-full max-w-7xl mx-auto bg-white shadow-2xl rounded-3xl overflow-hidden min-h-[700px] flex flex-col relative">
        
        <div class="bg-white border-b border-gray-100 px-8 py-6 flex flex-col md:flex-row justify-between items-center gap-4 z-10">
            <div class="flex items-center gap-4 w-full md:w-auto">
                <button id="dynamic-back-btn" onclick="handleBackButton()" class="btn-back shadow-sm">← Back to tools</button>
                <h1 class="text-3xl font-black text-gray-900">Classroom <span class="text-indigo-600">Jeopardy</span></h1>
            </div>
            <div id="level-indicator" class="hidden bg-indigo-100 text-indigo-700 px-6 py-2 rounded-full font-black text-xl shadow-inner tracking-widest">
                Level: --
            </div>
        </div>

        <div id="view-setup" class="flex-1 p-6 md:p-10 bg-gray-50 flex flex-col items-center justify-center">
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
                <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">Game Setup</h3>
                
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-600 mb-2">Select Level</label>
                    <select id="level-select" class="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500 font-medium text-gray-700">
                        <option value="B2">B2</option>
                        <option value="C1">C1</option>
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-600 mb-2">Number of Teams</label>
                    <input type="number" id="team-count" min="2" max="6" value="2" onchange="generateTeamInputs()" class="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500 font-medium text-gray-700">
                </div>

                <div id="team-names-container" class="space-y-3 mb-8">
                </div>

                <button onclick="startGame()" class="w-full bg-indigo-600 text-white text-lg font-black px-6 py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition transform hover:-translate-y-1">
                    Start Game
                </button>
            </div>
        </div>

        <div id="view-game" class="hidden flex-1 p-6 bg-gray-50 flex-row gap-6">
            <div id="board-container" class="flex-1 grid grid-cols-6 gap-4">
            </div>

            <div class="w-64 bg-white rounded-2xl p-5 shadow-sm border border-gray-200 flex flex-col">
                <h3 class="font-black text-gray-500 uppercase tracking-widest border-b border-gray-100 pb-3 mb-4">Leaderboard</h3>
                <div id="leaderboard" class="space-y-3 flex-1">
                </div>
            </div>
        </div>

        <div id="question-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm p-4">
            <div class="bg-white w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden flex flex-col">
                
                <div class="bg-indigo-600 text-white px-8 py-4 flex justify-between items-center">
                    <h2 id="modal-category" class="text-xl font-black uppercase tracking-widest">Category</h2>
                    <span id="modal-points" class="bg-white/20 px-4 py-1 rounded-lg font-bold">0 Points</span>
                </div>

                <div class="p-8 flex flex-col gap-6 text-center min-h-[300px] justify-center">
                    <div id="modal-prompt" class="text-3xl font-bold text-gray-800">Loading question...</div>
                    <div id="modal-hint" class="hidden text-xl text-yellow-600 font-semibold bg-yellow-50 p-4 rounded-xl"></div>
                    <div id="modal-answer" class="hidden text-2xl font-black text-green-600 bg-green-50 p-4 rounded-xl border border-green-200"></div>
                    <div id="modal-discussion" class="hidden text-xl text-indigo-700 italic bg-indigo-50 p-4 rounded-xl border border-indigo-100 mt-4"></div>
                </div>

                <div class="bg-gray-50 px-8 py-5 border-t border-gray-100 flex flex-wrap justify-center gap-4">
                    <button id="btn-show-hint" onclick="revealStage('hint')" class="hidden bg-yellow-500 text-white font-bold px-6 py-3 rounded-xl hover:bg-yellow-600 transition">Show Hint</button>
                    <button id="btn-show-answer" onclick="revealStage('answer')" class="hidden bg-gray-800 text-white font-bold px-6 py-3 rounded-xl hover:bg-gray-900 transition">Show Answer</button>
                    <button id="btn-show-discussion" onclick="revealStage('discussion')" class="hidden bg-indigo-500 text-white font-bold px-6 py-3 rounded-xl hover:bg-indigo-600 transition">Show Discussion</button>
                    
                    <div class="flex gap-4 w-full justify-center mt-2 pt-4 border-t border-gray-200">
                        <button onclick="resolveQuestion(true)" class="bg-green-500 text-white font-black px-8 py-4 rounded-xl hover:bg-green-600 shadow-lg transform transition hover:-translate-y-1">Correct</button>
                        <button onclick="resolveQuestion(false)" class="bg-red-500 text-white font-black px-8 py-4 rounded-xl hover:bg-red-600 shadow-lg transform transition hover:-translate-y-1">Incorrect</button>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://ehhkjhyanmovymjqlxwo.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaGtqaHlhbm1vdnltanFseHdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczODI3NzQsImV4cCI6MjA4Mjk1ODc3NH0.LIbusFxccfDl_Jxf3NO0CIKo4WRUA-88R9bQwQ1QWuk";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let gameState = {
            level: 'B2',
            teams: [],
            currentTeamIndex: 0,
            categories: ['Phrasal Verbs', 'Collocations', 'Grammar 1', 'Grammar 2', 'Vocabulary', 'Speaking'],
            points: [800, 700, 600, 500, 400, 300, 200, 100],
            
            // New memory slots for the active question
            activeButtonId: null,
            activePoints: 0,
            activeQuestion: null
        };

        const adjectives = ['Red', 'Blue', 'Flying', 'Electric', 'Brave', 'Clever', 'Mighty', 'Sneaky', 'Golden'];
        const nouns = ['Rockets', 'Bears', 'Tigers', 'Eagles', 'Dolphins', 'Wizards', 'Ninjas', 'Dragons', 'Lions'];

        function getRandomTeamName() {
            const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
            const noun = nouns[Math.floor(Math.random() * nouns.length)];
            return `${adj} ${noun}`;
        }

        function generateTeamInputs() {
            const count = document.getElementById('team-count').value;
            const container = document.getElementById('team-names-container');
            container.innerHTML = ''; 

            for (let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <input type="text" id="team-name-${i}" value="${getRandomTeamName()}" class="w-full p-3 rounded-xl border border-gray-200 focus:outline-none focus:border-indigo-500 font-medium text-gray-700">
                `;
            }
        }

        function startGame() {
            gameState.level = document.getElementById('level-select').value;
            const teamCount = document.getElementById('team-count').value;
            
            gameState.teams = [];
            for (let i = 1; i <= teamCount; i++) {
                const name = document.getElementById(`team-name-${i}`).value;
                gameState.teams.push({ name: name, score: 0 });
            }

            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            document.getElementById('view-game').classList.add('flex');
            
            const levelIndicator = document.getElementById('level-indicator');
            levelIndicator.innerText = `Level: ${gameState.level}`;
            levelIndicator.classList.remove('hidden');

            // Change the sign on the door to say "setup"
            document.getElementById('dynamic-back-btn').innerText = '← Back to setup';

            updateLeaderboard();
            buildBoard();
        }

        function buildBoard() {
            const board = document.getElementById('board-container');
            board.innerHTML = '';

            gameState.categories.forEach((cat, colIndex) => {
                let columnHTML = `<div class="flex flex-col gap-2"><div class="bg-indigo-600 text-white text-center font-bold py-3 rounded-xl shadow-sm text-sm uppercase tracking-wider h-16 flex items-center justify-center">${cat}</div>`;

                gameState.points.forEach((points, rowIndex) => {
                    const isBottomRow = (points === 100);
                    const disabledAttr = isBottomRow ? '' : 'disabled';
                    const cursorClass = isBottomRow ? 'cursor-pointer hover:-translate-y-1 hover:shadow-md hover:bg-indigo-50 hover:border-indigo-300' : '';
                    const btnId = `btn-${colIndex}-${rowIndex}`;

                    columnHTML += `
                        <button 
                            id="${btnId}"
                            data-col="${colIndex}" data-row="${rowIndex}"
                            class="jeopardy-btn bg-white border-2 border-gray-200 text-indigo-700 font-black text-xl py-4 rounded-xl shadow-sm flex-1 ${cursorClass}"
                            ${disabledAttr}
                            onclick="handleQuestionClick('${btnId}', '${cat}', ${points})"
                        >
                            ${points}
                        </button>
                    `;
                });

                columnHTML += `</div>`;
                board.innerHTML += columnHTML;
            });
        }

        function updateLeaderboard() {
            const lb = document.getElementById('leaderboard');
            lb.innerHTML = '';

            gameState.teams.forEach((team, index) => {
                const isCurrentTurn = (index === gameState.currentTeamIndex);
                const borderClass = isCurrentTurn ? 'border-indigo-500 bg-indigo-50 shadow-md scale-105' : 'border-gray-100 bg-white opacity-70';
                const textClass = isCurrentTurn ? 'text-indigo-700' : 'text-gray-600';
                const turnBadge = isCurrentTurn ? '<span class="text-xs font-black bg-indigo-600 text-white px-2 py-1 rounded ml-2 uppercase">Playing</span>' : '';

                lb.innerHTML += `
                    <div class="p-3 rounded-xl border-2 transition-all duration-300 ${borderClass} flex flex-col">
                        <div class="flex justify-between items-center mb-1">
                            <div class="font-bold ${textClass}">${team.name}</div>
                            ${turnBadge}
                        </div>
                        <div class="font-black text-2xl ${textClass}">${team.score}</div>
                    </div>
                `;
            });
        }

        function checkWinCondition() {
            if (gameState.currentTeamIndex !== 0) return;

            let pointsRemaining = 0;
            document.querySelectorAll('.jeopardy-btn:not(.completed)').forEach(btn => {
                pointsRemaining += parseInt(btn.innerText);
            });

            let sortedTeams = [...gameState.teams].sort((a, b) => b.score - a.score);
            let firstPlace = sortedTeams[0];
            let secondPlace = sortedTeams[1];

            if ((firstPlace.score - secondPlace.score) > pointsRemaining || pointsRemaining === 0) {
                if (firstPlace.score === secondPlace.score) {
                    triggerVictory("It's a tie!");
                } else {
                    triggerVictory(firstPlace.name + " takes the victory!");
                }
            }
        }

        function triggerVictory(message) {
            document.getElementById('board-container').innerHTML = `
                <div class="col-span-6 flex flex-col items-center justify-center bg-indigo-600 rounded-2xl text-white p-10 shadow-2xl animate-pulse min-h-[400px]">
                    <h2 class="text-6xl font-black mb-4">🏆 Game Over 🏆</h2>
                    <p class="text-4xl font-bold text-center">${message}</p>
                </div>
            `;
        }

        function handleBackButton() {
            const gameView = document.getElementById('view-game');
            const backBtn = document.getElementById('dynamic-back-btn');
            
            // If the game board is open...
            if (!gameView.classList.contains('hidden')) {
                // Hide the game board
                gameView.classList.add('hidden');
                gameView.classList.remove('flex');
                
                // Show the setup screen
                document.getElementById('view-setup').classList.remove('hidden');
                document.getElementById('level-indicator').classList.add('hidden');
                
                // Change the sign on the door to say "tools"
                backBtn.innerText = '← Back to tools';
            } else {
                // If we are already on the setup screen, leave the game entirely
                window.location.href = 'index.html';
            }
        }

        async function handleQuestionClick(btnId, category, points) {
            gameState.activeButtonId = btnId;
            gameState.activePoints = points;
            
            const btn = document.getElementById(btnId);
            btn.innerHTML = "⏳"; // Show a tiny hourglass while fetching

            // Fetch all questions matching level and category
            const { data, error } = await supabaseClient
                .from('jeopardy_questions')
                .select('*')
                .eq('level', gameState.level)
                .eq('category', category);

            btn.innerHTML = points; // Put points back

            if (error || !data || data.length === 0) {
                alert("No questions found for this category and level. Did you add them to Supabase?");
                return;
            }

            // Pick a random question from the list
            const randomQuestion = data[Math.floor(Math.random() * data.length)];
            gameState.activeQuestion = randomQuestion;

            openModal(category, points, randomQuestion);
        }

        function openModal(category, points, qData) {
            document.getElementById('modal-category').innerText = category;
            document.getElementById('modal-points').innerText = `${points} Points`;
            
            document.getElementById('modal-prompt').innerText = qData.prompt;
            
            // Reset visibility
            document.getElementById('modal-hint').classList.add('hidden');
            document.getElementById('modal-answer').classList.add('hidden');
            document.getElementById('modal-discussion').classList.add('hidden');
            
            document.getElementById('btn-show-hint').classList.toggle('hidden', !qData.hint);
            document.getElementById('btn-show-answer').classList.remove('hidden');
            document.getElementById('btn-show-discussion').classList.add('hidden'); // Only show after answer

            // Populate text (but keep it hidden for now)
            if (qData.hint) document.getElementById('modal-hint').innerText = `Hint: First letter is '${qData.hint}'`;
            document.getElementById('modal-answer').innerText = qData.answer;
            if (qData.discussion) document.getElementById('modal-discussion').innerText = qData.discussion;

            document.getElementById('question-modal').classList.remove('hidden');
        }

        function revealStage(stage) {
            if (stage === 'hint') {
                document.getElementById('modal-hint').classList.remove('hidden');
                document.getElementById('btn-show-hint').classList.add('hidden');
            }
            if (stage === 'answer') {
                document.getElementById('modal-answer').classList.remove('hidden');
                document.getElementById('btn-show-answer').classList.add('hidden');
                // If there is a discussion, show the button to reveal it now
                if (gameState.activeQuestion.discussion) {
                    document.getElementById('btn-show-discussion').classList.remove('hidden');
                }
            }
            if (stage === 'discussion') {
                document.getElementById('modal-discussion').classList.remove('hidden');
                document.getElementById('btn-show-discussion').classList.add('hidden');
            }
        }

        function resolveQuestion(isCorrect) {
            if (isCorrect) {
                // Add points to the current team
                gameState.teams[gameState.currentTeamIndex].score += gameState.activePoints;
                
                // Hide the button that was just answered
                const answeredBtn = document.getElementById(gameState.activeButtonId);
                answeredBtn.classList.add('completed');
                
                // Unlock the button directly above it
                const col = answeredBtn.dataset.col;
                const row = parseInt(answeredBtn.dataset.row);
                if (row > 0) { // If it's not the top row
                    const buttonAbove = document.getElementById(`btn-${col}-${row - 1}`);
                    if (buttonAbove) {
                        buttonAbove.removeAttribute('disabled');
                        buttonAbove.classList.add('cursor-pointer', 'hover:-translate-y-1', 'hover:shadow-md', 'hover:bg-indigo-50', 'hover:border-indigo-300');
                    }
                }
            }
            // If incorrect, we do nothing to the board. The button remains active.

            // Move to the next team
            gameState.currentTeamIndex = (gameState.currentTeamIndex + 1) % gameState.teams.length;
            
            updateLeaderboard();
            document.getElementById('question-modal').classList.add('hidden');
            checkWinCondition();
        }

        window.onload = generateTeamInputs;

    </script>
</body>
</html>
